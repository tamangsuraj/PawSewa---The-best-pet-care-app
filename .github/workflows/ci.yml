name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-install:
    name: Backend dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

  next-build:
    name: Next.js ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [website, admin]
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    defaults:
      run:
        working-directory: apps/web/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      # List both lockfiles so cache resolution always finds real paths (matrix vars in
      # cache-dependency-path can fail glob resolution on ubuntu-latest — see actions/setup-node#745).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/web/website/package-lock.json
            apps/web/admin/package-lock.json
      - run: npm ci
      - run: npm run build

  flutter-analyze:
    name: Flutter analyze (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [user_app, vet_app]
    defaults:
      run:
        working-directory: apps/mobile/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
